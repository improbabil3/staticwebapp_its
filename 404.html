<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina non trovata</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fef2f2;
      color: #7f1d1d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
    }
    a {
      color: #b91c1c;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404 - Pagina non trovata</h1>
    <p>La risorsa che stai cercando non esiste oppure l'URL è errato.</p>
    <p><a href="/">Torna alla home</a></p>
  </div>
</body>
</html>
